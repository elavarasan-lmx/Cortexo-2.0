services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cortexo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-cortexo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cortexo_dev_2026}
      POSTGRES_DB: ${DB_NAME:-cortexo}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-cortexo} -d ${DB_NAME:-cortexo}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cortexo-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Server ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    container_name: cortexo-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-cortexo}:${DB_PASSWORD:-cortexo_dev_2026}@postgres:5432/${DB_NAME:-cortexo}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-32chars}
      APP_URL: ${APP_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_SECRET: ${GITHUB_APP_SECRET:-}
      GITLAB_APP_ID: ${GITLAB_APP_ID:-}
      GITLAB_APP_SECRET: ${GITLAB_APP_SECRET:-}
    ports:
      - '4000:4000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/v1/health']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Web App ─────────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000/v1}
    container_name: cortexo-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/v1}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
    driver: local
    name: cortexo_postgres_data
  redis_data:
    driver: local
    name: cortexo_redis_data

networks:
  default:
    name: cortexo_network
