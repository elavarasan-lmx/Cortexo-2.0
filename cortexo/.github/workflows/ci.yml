name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check (API)
        run: npx tsc --noEmit --project apps/api/tsconfig.json

      - name: TypeScript check (Web)
        run: npx tsc --noEmit --project apps/web/tsconfig.json

      - name: Build
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cortexo_test
          POSTGRES_PASSWORD: cortexo_test
          POSTGRES_DB: cortexo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cortexo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cortexo_test:cortexo_test@localhost:5432/cortexo_test
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      NEXTAUTH_SECRET: ci-test-nextauth-secret-not-for-production
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      UNSAFE_DEV_AUTH: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present
