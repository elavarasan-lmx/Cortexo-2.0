# ═══════════════════════════════════════════════════════════════════════════════
# Cortexo CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
# Monorepo: @cortexo/web (Next.js 16) + @cortexo/api (Fastify) + @cortexo/db (Drizzle)
# Triggers on push to main/develop and PRs to main
# Stages: Lint → TypeCheck → Test → Build → Docker → Deploy
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 1: Install & Cache
  # ═══════════════════════════════════════════════════════════════════════════
  install:
    name: 📦 Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 2: Lint
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint -- --continue 2>&1 || true

      - name: Check formatting
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}" 2>&1 || echo "⚠️ Formatting issues found (non-blocking)"

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 3: TypeScript Checks
  # ═══════════════════════════════════════════════════════════════════════════
  typecheck:
    name: 🔬 TypeCheck
    runs-on: ubuntu-latest
    needs: install
    strategy:
      fail-fast: false
      matrix:
        workspace: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: TypeScript check (${{ matrix.workspace }})
        run: npx tsc --noEmit --project apps/${{ matrix.workspace }}/tsconfig.json

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 4: Tests
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: install

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cortexo_test
          POSTGRES_PASSWORD: cortexo_test
          POSTGRES_DB: cortexo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cortexo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://cortexo_test:cortexo_test@localhost:5432/cortexo_test
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      NEXTAUTH_SECRET: ci-test-nextauth-secret-not-for-production
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      UNSAFE_DEV_AUTH: 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run DB migrations
        run: npm run db:push 2>&1 || echo "⚠️ DB push skipped"

      - name: Run tests
        run: npm run test --if-present

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 5: Build
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]

    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      JWT_SECRET: build-time-placeholder
      NEXTAUTH_SECRET: build-time-placeholder
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
      NEXT_PHASE: phase-production-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Build all packages
        run: npm run build

      - name: Verify API build output
        run: |
          test -d apps/api/dist && echo "✅ API dist/ exists" || (echo "❌ API build failed" && exit 1)
          ls -la apps/api/dist/

      - name: Verify Web build output
        run: |
          test -d apps/web/.next && echo "✅ Web .next/ exists" || (echo "❌ Web build failed" && exit 1)
          du -sh apps/web/.next/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/api/dist/
            apps/web/.next/
          retention-days: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 6: Docker Build (main branch only)
  # ═══════════════════════════════════════════════════════════════════════════
  docker:
    name: 🐳 Docker
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Docker meta (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:4000/v1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  # Stage 7: Deploy (main branch only)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Deploying Cortexo..."
            cd ${{ vars.DEPLOY_PATH || '/opt/cortexo' }}

            # Pull latest images
            docker compose pull

            # Run DB migrations
            docker compose run --rm api npx drizzle-kit push 2>/dev/null || true

            # Rolling restart (zero-downtime)
            docker compose up -d --remove-orphans

            # Health check
            sleep 10
            curl -sf http://localhost:4000/v1/health || (echo "❌ API health check failed" && exit 1)
            curl -sf http://localhost:3000 || (echo "❌ Web health check failed" && exit 1)
            echo "✅ Deployment successful"

      - name: Post deployment status
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # Pipeline Status Summary
  # ═══════════════════════════════════════════════════════════════════════════
  status:
    name: ✅ Pipeline Status
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    if: always()
    steps:
      - name: Check pipeline result
        run: |
          echo "## 📊 CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔬 TypeCheck | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ref:** \`${{ github.ref_name }}\` @ \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

          # Fail if any critical stage failed
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Pipeline failed — test or build stage failed"
            exit 1
          fi
          echo "✅ Pipeline passed"
