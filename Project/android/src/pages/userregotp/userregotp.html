<ion-header>
  <ion-navbar>
    <button ion-button menuToggle>
      <ion-icon name="menu"></ion-icon>
    </button>
    <ion-title>OTP Verification</ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <form [formGroup]="userotpForm" (ngSubmit)="onSubmit(userotpForm)"  novalidate padding style="padding-bottom: 0px !important">
    <ion-list>
      <ion-item class="errMsg" *ngIf="errorMessage != ''">{{errorMessage}}</ion-item><br>
      <ion-row>
        <ion-col col-2 class="icon_col"><ion-icon class="ionicon" name="key"></ion-icon></ion-col>
        <ion-col col-10 class="component_col"><ion-input [formControl]="verifyotp" type="number" placeholder="OTP" maxlength="4"></ion-input></ion-col>
      </ion-row>
    </ion-list><br>
    
    <button [disabled]="!userotpForm.valid || isDisabled" ion-button class="btn_common" block color="dark">Submit</button>
  </form>
  <!-- <div>
    <ion-note style="float: right">
      <a (click)="resendOTP()" style="text-transform: initial;" ion-button clear>Resend OTP </a>
   </ion-note>
  </div> -->
  <div style="margin:16px !important">
    <ion-row>
      <ion-col style="margin: auto !important;"><span class="jost-500" style="color: #d7b470;">Resend will be</span> <span class="jost-500" style="color: #000 !important;">{{countDown | async | formattime}}</span></ion-col>
        <ion-col align="end">
          <button ion-button [disabled]="data !='1'" (click)="resendOTP()" class="btn_common button-login" block color="dark">Resend OTP</button>
        </ion-col>
    </ion-row>
  </div>
</ion-content>
