<ion-header align-title=”center”>
  <ion-navbar align-title=”center”>
    <button ion-button menuToggle>
      <ion-icon name="menu"></ion-icon>
    </button>
    <ion-title align-title=”center”><img alt="logo" height="40" src="assets/imgs/header.svg"></ion-title>
  </ion-navbar>
</ion-header>

<ion-content text-justify padding-bottom margin-bottom>
  <ion-card *ngFor="let message of messages; let i = index">
    <ion-item>
      <ion-avatar item-start>
        <img src="assets/imgs/logo.svg">
      </ion-avatar>
      <h2>{{message.newstitle}}</h2>
      <p>{{message.lastupdate}}</p>
    </ion-item>

    <ion-card-content [innerHTML]="message.messages">

    </ion-card-content>

  </ion-card>
</ion-content>
