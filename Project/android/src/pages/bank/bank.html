<ion-header>
  <ion-navbar>
    <button ion-button menuToggle clear>
      <ion-icon name="menu" class="menu-icon"></ion-icon>
    </button>
    <ion-title>
      BANK DETAILS
    </ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <ion-card *ngFor="let bank of bandetails">
    <!-- <ion-card-header>
      {{ bank.header }}
    </ion-card-header> -->

    <ion-card-content class="contact-us">
      <img [src]="bank.logo" class="bank-logo">

      <ion-grid class="bank-details">
        <ion-row class="detail-row" *ngFor="let detail of bank.details">
          <ion-col col-5>{{ detail.field }}</ion-col>
          <ion-col col-1 class="separator">:</ion-col>
          <ion-col col-6>{{ detail.value }}</ion-col>
        </ion-row>
      </ion-grid>
    </ion-card-content>
  </ion-card>
</ion-content>
