  Ionic pages and navigation.

<ion-header>

  <ion-navbar>
      <button ion-button menuToggle class="menuToggle">
          <ion-icon name="menu"></ion-icon>
      </button>
    <ion-title>News & Events</ion-title>
  </ion-navbar>

</ion-header>


<ion-content padding>
  <ion-card *ngFor="let news of newslist; let i= index">
    <p><span class="update_date"><ion-icon name="calendar"></ion-icon>{{news.event_date}}</span></p>
    <ion-row>
      <ion-col col-2 class="megaphone"><ion-icon name="megaphone"></ion-icon></ion-col>
      <ion-col col-10 class="empty_col"><span class="event_name">&nbsp;{{news.eventname}}</span><span>{{news.description}}</span></ion-col>
    </ion-row>
    <p class="update_date"> <ion-icon name="clock"></ion-icon>&nbsp;{{news.event_time}}</p>
  </ion-card>

</ion-content>
