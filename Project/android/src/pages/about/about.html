<ion-header>
  <ion-navbar>
    <button ion-button menuToggle clear>
      <ion-icon name="menu" class="menu-icon"></ion-icon>
    </button>
    <ion-title>
      ABOUT US
    </ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <ion-card *ngFor="let about of aboutusdetails">
    <ion-card-header>
      {{ about.title }}
    </ion-card-header>
    <ion-card-content [innerHTML]="about.content" class="about-content"></ion-card-content>
  </ion-card>
</ion-content>
