<ion-header>

  <ion-navbar>
      <button ion-button menuToggle class="menuToggle">
          <ion-icon name="menu"></ion-icon>
      </button>
    <ion-title>videos</ion-title>
  </ion-navbar>

</ion-header>


<ion-content padding >
  <div style="margin-bottom:45px !important;">
     <ion-card *ngFor="let video of videourl; let i = index" >
        <ion-row  style="padding-bottom: 5px !important;padding-left: 5px"><ion-col col-2 class="col_log" ><ion-fab><button ion-fab><img class="log_img" src="assets/imgs/logo.svg"/></button></ion-fab></ion-col><ion-col col-9 class="text-content">{{video.description}}</ion-col></ion-row>
          <iframe id="player" width="340" height="200" encrypted-media [src]="(video.url)" frameborder="0" allowfullscreen id="player"></iframe>
      </ion-card>
    </div>

</ion-content>
