<ion-header>
    <ion-navbar>
        <button ion-button menuToggle clear>
            <ion-icon name="menu" class="menu-icon"></ion-icon>
        </button>
        <ion-title>
            HISTORICAL DATA
        </ion-title>
    </ion-navbar>
</ion-header>

<ion-content text-center>
    <ion-card>
        <ion-grid>
            <ion-row>
                <ion-col col-6>
                    <label style="color: #000 !important;">From Date</label>
                    <ion-datetime [(ngModel)]="fromdate" placeholder="From" displayFormat="DD-MM-YYYY"
                        class="type"></ion-datetime>
                </ion-col>
                <ion-col col-6>
                    <label style="color: #000 !important;">To Date</label>
                    <ion-datetime [(ngModel)]="todate" placeholder="To" displayFormat="DD-MM-YYYY"
                        class="type"></ion-datetime>
                </ion-col>
            </ion-row><br />

            <ion-row class="light-border-btm second-headercol">
                <ion-col col-12>
                    <div class="header_title4">CHOOSE COMMODITY</div>
                </ion-col>
                <ion-col col-12 style="margin-top: -15px !important;">
                    <div class="comodity">
                        <ion-select [(ngModel)]="selected_comid" placeholder="Select">
                            <ion-option *ngFor="let value of liverates let i = index;" [value]="value['com_id']">
                                {{value['com_name']}} </ion-option>
                        </ion-select>
                    </div>

                </ion-col>
            </ion-row>
            <!-- <ion-row>
        <ion-col>
          <ion-select [(ngModel)]="selected_comid" placeholder="Select" class="bordered-select">
            <ion-option *ngFor="let value of liverates let i = index;" [value]="value['com_id']"> {{value['com_name']}} </ion-option>
        </ion-select>
        </ion-col>
      </ion-row> -->
            <ion-row class="light-border-btm second-headercol">
                <ion-col col-12>
                    <div class="header_title4">LIVE RATE</div>
                </ion-col>
                <ng-container *ngFor="let liverate of live_rates; let i = index">
                    <ion-col col-12 style="margin-top: 10px !important;">
                        <div class="input_style12"
                            [ngClass]="{'ratehigh' : (liverate.selling_rate > oldliverates[i].selling_rate), 'ratelow':(liverate.selling_rate < oldliverates[i].selling_rate), 'ratenormal': (liverate.selling_rate == oldliverates[i].selling_rate)}">
                            {{liverate.selling_rate}}</div>
                    </ion-col>
                </ng-container>
            </ion-row>
            <!-- <ion-row style="display: flex;justify-content: center;align-items: center;">
        <ion-col style="color: #000 !important;">Live Rate</ion-col>
      </ion-row> -->
            <!-- <ng-container *ngFor="let liverate of live_rates; let i = index" style="color: #fff !important;">
            <ion-row style="display: flex;justify-content: center;align-items: center;color: #fff !important;">
                <div class="input_style12" [ngClass]="{'ratehigh' : (liverate.selling_rate > oldliverates[i].selling_rate), 'ratelow':(liverate.selling_rate < oldliverates[i].selling_rate), 'ratenormal': (liverate.selling_rate == oldliverates[i].selling_rate)}">{{liverate.selling_rate}}</div>
            </ion-row>
          </ng-container> -->
            <!-- <ion-row style="display: flex;justify-content: center;align-items: center;">
          <div class="input_style12" [ngClass]="sell_color">{{curcomsellrate}}</div>
      </ion-row><br/> -->
            <ion-row>
                <ion-col style="text-align: center;">
                    <button ion-button small (click)="getHistoricalReport()" class="btn_login">Submit</button>
                </ion-col>
            </ion-row>
        </ion-grid>
    </ion-card>


    <div *ngIf="ratehistory_len != 0">
        <ion-card>
            <ion-card-content>
                <ion-row style="background-color: #d7b470;">
                    <ion-col col-4>Date</ion-col>
                    <ion-col col-4>Buy(₹)</ion-col>
                    <ion-col col-4>Sell(₹)</ion-col>
                </ion-row>

                <div *ngFor="let rate of ratehistory">
                    <ion-row class="historical_data">
                        <ion-col col-4>{{rate.hda_date || '-'}}</ion-col>
                        <ion-col col-4>{{rate.hda_bid || '-'}}</ion-col>
                        <ion-col col-4>{{rate.hda_ask || '-'}}</ion-col>
                    </ion-row>
                </div>

            </ion-card-content>
        </ion-card>
    </div>
    <!-- <div *ngIf="ratehistory_len == 0">
    <ion-card>
      <ion-card-content>
        <span>No Data</span>
      </ion-card-content>
    </ion-card>
  </div> -->

</ion-content>
