<ion-header>
  <ion-navbar>
    <button ion-button menuToggle clear>
      <ion-icon name="menu" class="menu-icon"></ion-icon>
    </button>
    <ion-title>
      Forgot Password
    </ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
	<form [formGroup]="forgotpwdForm" (ngSubmit)="onSubmit(forgotpwdForm.value)" novalidate padding>
    <ion-list>
			<ion-row>
          <ion-col col-2 class="icon_col"><ion-icon class="ionicon" name="phone-portrait"></ion-icon></ion-col>
          <ion-col col-10 class="component_col"><ion-input type="tel" maxlength="10" [formControl]="username" placeholder="10 digit mobile number"></ion-input></ion-col>
			</ion-row><br>
		  <button class="btn_common" ion-button block color="dark">SUBMIT</button><!--[disabled]="!forgotpwdForm.valid || isDisabled"-->
    </ion-list>
  </form>
</ion-content>
