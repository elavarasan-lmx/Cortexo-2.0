<ion-header>
  <ion-navbar>
    <button ion-button menuToggle clear>
      <ion-icon name="menu" class="menu-icon"></ion-icon>
    </button>
    <ion-title>Economic Calendar</ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <ion-grid>
    <ion-row>
      <!-- Loader -->
      <ion-col text-center *ngIf="loader">
        <ion-spinner></ion-spinner>
        <p>Loading...</p>
      </ion-col>

      <!-- Calendar -->
      <ion-col *ngIf="!loader">
        <div id="fxst_calendar" class="last-table" style="position: relative; width: 100%; overflow-x: auto;">
          <iframe 
            src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&features=datepicker,timezone&countries=14,4,5&calType=week&timeZone=23&lang=1"
            width="100%" 
            height="467" 
            frameborder="0" 
            allowtransparency="true"
            marginwidth="0" 
            marginheight="0">
          </iframe>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
