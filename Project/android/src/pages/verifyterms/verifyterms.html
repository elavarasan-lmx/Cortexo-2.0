<ion-header>
  <ion-navbar>
    <ion-title>
      <ion-row>
        <ion-col col-10>Terms & Conditions</ion-col>
        <ion-col col-2 style="text-align: right;" (click)="close()"><ion-icon name="close-circle"></ion-icon></ion-col>
      </ion-row>
    </ion-title>
  </ion-navbar>
</ion-header>

<ion-content>
  <ion-card [innerHTML]="terms | safeHtml"  style="margin-bottom: 120px !important;padding: 5px !important;">

  </ion-card>

</ion-content>
<ion-footer>
  <ion-row style="text-align: center;">
    <ion-col>
      <button ion-button class="btn_common" (click)="agree()">Agree</button>
    </ion-col>
  </ion-row>
</ion-footer>
