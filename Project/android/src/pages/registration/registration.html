<ion-header align-title=”center”>
    <ion-navbar align-title=”center”>
        <ion-title align-title=”center” style="padding-top: 6px !important;"><img alt="logo" height="50" cache="true"
                src="assets/imgs/header.svg"></ion-title>
    </ion-navbar>
</ion-header>

<ion-content text-center padding>
    <ion-card>
        <ion-card-header text-center>
            Registration
        </ion-card-header>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit(registerForm.value)" style="" novalidate padding>
            <ion-list>
                <ion-item class="errMsg" *ngIf="errorMessage != ''">{{errorMessage}}</ion-item>
                <ion-item>
                    <ion-label floating>Name(*)</ion-label>
                    <ion-input [formControl]="name" type="text"></ion-input>
                </ion-item>
                <ion-item>
                    <ion-label floating>Mobile Number(*)</ion-label>
                    <ion-input [formControl]="mobile" type="number" minlength="10"></ion-input>
                </ion-item>
                <ion-item>
                    <ion-label floating>Email</ion-label>
                    <ion-input [formControl]="emailid" type="email"></ion-input>
                </ion-item>
                <ion-item>
                    <ion-label floating>City(*)</ion-label>
                    <ion-input type="text" [formControl]="city"></ion-input>
                </ion-item>
                <ion-item>
                    <ion-label floating>Company</ion-label>
                    <ion-input type="text" [formControl]="company"></ion-input>
                </ion-item>
            </ion-list>
            <br>
            <button [disabled]="!registerForm.valid || isDisabled" style="background:#E7BB36 !important;
               color:#000 !important;" ion-button class="button-login" block color="dark">Submit</button>
        </form>
    </ion-card>
</ion-content>
<ion-footer class="footer-bottom">
    <ion-grid>
        <ion-row>
            <ion-col>&copy;MAHARAJ GOLD SMITH.</ion-col>
            <ion-col text-right>Logimax</ion-col>
        </ion-row>
    </ion-grid>
</ion-footer>
