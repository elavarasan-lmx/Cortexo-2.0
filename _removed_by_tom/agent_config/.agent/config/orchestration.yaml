# Cortexo Agent Orchestration Rulebook (F129)
# Defines patterns for multi-agent coordination.

version: "0.1.0"

# Maximum sub-agents per supervisor (Production Guardrail #2)
max_sub_agents: 5

# Token budget multiplier for multi-agent runs (Guardrail #3)
token_budget_multiplier: 15

# Context compaction trigger threshold (Guardrail #4)
compaction_threshold_percent: 70

# Allowed orchestration patterns
patterns:
  - name: direct_invocation
    description: "Single supervisor directly calls a single sub-agent"
    max_depth: 2

  - name: parallel_fan_out
    description: "Supervisor fans out to N independent sub-agents, merges results"
    max_agents: 5
    requires_merge: true

  - name: sequential_pipeline
    description: "User-driven sequential execution (plan → approve → execute → verify)"
    requires_approval: true

  - name: research_isolation
    description: "Read-only research agent runs in isolated context"
    risk_level: safe

# Banned anti-patterns
banned_patterns:
  - recursive_agent_calls
  - deep_agent_trees
  - meta_orchestrator
  - unscoped_context_sharing
