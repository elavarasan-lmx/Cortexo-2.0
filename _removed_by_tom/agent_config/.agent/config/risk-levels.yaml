# Cortexo Skill Risk Classification (F130)
# Every AI agent action is tagged with a risk level.

version: "0.1.0"

risk_levels:
  safe:
    description: "Read-only operations. No side effects."
    requires_approval: false
    examples:
      - "Read file contents"
      - "Search codebase"
      - "Analyze error logs"
      - "Generate report"

  moderate:
    description: "Write to staging or non-production environments."
    requires_approval: false
    examples:
      - "Create branch"
      - "Write to .agent/ memory"
      - "Run tests in sandbox"
      - "Generate code suggestions"

  critical:
    description: "Write to production systems."
    requires_approval: true
    examples:
      - "Deploy to production server"
      - "Create pull request"
      - "Modify database schema"
      - "Update client configuration"

  destructive:
    description: "Delete or drop operations. Irreversible."
    requires_approval: true
    requires_double_confirmation: true
    examples:
      - "Drop database table"
      - "Delete production files"
      - "Remove client access"
      - "Purge logs"
