# Cortexo — PHP CodeIgniter 3 Pipeline Template
name: PHP CI3 CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          extensions: mbstring, pdo, pdo_mysql, gd, curl
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Run PHP syntax check
        run: find application/ -name "*.php" -exec php -l {} \;

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --configuration phpunit.xml --coverage-text

      - name: PHP CodeSniffer (PSR-2)
        run: vendor/bin/phpcs --standard=PSR2 application/controllers/ application/models/

      - name: Notify Cortexo
        if: always()
        run: |
          curl -s -X POST "${{ secrets.CORTEXO_API_URL }}/v1/webhooks/github" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{"ref":"refs/heads/${{ github.ref_name }}","head_commit":{"id":"${{ github.sha }}","message":"${{ github.event.head_commit.message }}"},"repository":{"full_name":"${{ github.repository }}"}}'
        continue-on-error: true

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/html
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php index.php migrate latest
            service apache2 graceful
